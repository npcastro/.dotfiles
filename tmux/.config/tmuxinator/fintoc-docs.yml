# /Users/nicolascastro/.config/tmuxinator/fintoc-docs.yml

name: fintoc-docs
root: ~/workspace/fintoc/<%= @settings["worktree"] || 'fintoc-docs' %>

windows:
  - editor:
      panes:
        - nvim
  - server:
  - terminal:
  - lazygit:
      panes:
        - lazygit
  - claude:
      panes:
        - <%= @settings["container"] ? "docker exec -it -u agent #{@settings["container"]} claude --dangerously-skip-permissions" : "claude" %>
